<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arena Embroidery — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Cinzel:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* Solid black cover that fades out once video is ready */
    #video-cover {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 1.2s ease;
    }
    #video-cover.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Loader */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .loader-ring {
      width: 48px;
      height: 48px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-top-color: rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }

    .loader-text {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Fullscreen video background */
    #video-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    #video-bg video {
      width: calc(100% + 8px);
      height: calc(100% + 8px);
      object-fit: cover;
      margin-top: -4px;
      margin-left: -4px;
    }

    /* Layout */
    .content {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      text-align: center;
      color: #fff;
      padding: 4rem 2rem;
    }

    .logo {
      font-family: 'Cinzel', serif;
      font-size: clamp(2rem, 6vw, 5rem);
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      display: none;
    }

    .coming-soon {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.4rem, 3.5vw, 2.8rem);
      letter-spacing: 0.12em;
      opacity: 0.85;
    }

    @media (max-width: 768px) {
      #video-bg video {
        object-fit: contain;
        margin-top: 0;
        height: 100%;
      }

      /* Black bar height = (100vh - 56.25vw) / 2, center of each bar is half that */
      .logo {
        display: block;
        position: absolute;
        top: calc((100vh - 56.25vw) / 4);
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
        font-size: clamp(1.6rem, 9vw, 3rem);
      }

      .coming-soon {
        position: absolute;
        bottom: calc((100vh - 56.25vw) / 4);
        left: 50%;
        transform: translate(-50%, 50%);
        font-size: clamp(1.1rem, 5vw, 1.8rem);
      }
    }
  </style>
</head>
<body>

  <div id="video-cover">
    <div class="loader">
      <div class="loader-ring"></div>
      <span class="loader-text">Loading</span>
    </div>
  </div>

  <div id="video-bg">
    <video id="bg-video" autoplay muted loop playsinline preload="auto">
      <source src="bg.mp4" type="video/mp4" />
    </video>
  </div>

  <div class="content">
    <h1 class="logo">Arena Embroidery</h1>
    <p class="coming-soon">Coming Soon</p>
  </div>

  <script>
    const cover = document.getElementById('video-cover');
    const video = document.getElementById('bg-video');

    video.addEventListener('playing', function () {
      cover.classList.add('hidden');
    });

    function tryPlay() {
      video.play().catch(() => {});
    }

    // iOS Safari needs an explicit play() call
    document.addEventListener('DOMContentLoaded', tryPlay);

    // Re-trigger play when returning to the tab on mobile
    document.addEventListener('visibilitychange', function () {
      if (!document.hidden) tryPlay();
    });

    // Last resort fallback
    setTimeout(() => cover.classList.add('hidden'), 5000);
  </script>

</body>
</html>
