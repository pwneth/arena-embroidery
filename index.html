<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arena Embroidery — Coming Soon</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Georgia', serif;
    }

    /* YouTube fullscreen background */
    #video-bg {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 100vw;
      height: 100vh;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Keeps the iframe 16:9 and always covers the viewport */
    #video-bg iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100vw;
      height: 56.25vw; /* 16:9 */
      min-height: 100vh;
      min-width: 177.78vh; /* 16:9 */
      transform: translate(-50%, -50%);
      border: none;
    }

    /* Dark overlay so text is readable */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1;
    }

    /* Centered content */
    .content {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fff;
      padding: 2rem;
    }

    .logo {
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: clamp(0.85rem, 2vw, 1.2rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      opacity: 0.75;
      margin-bottom: 3rem;
    }

    .coming-soon {
      font-size: clamp(0.7rem, 1.5vw, 0.95rem);
      letter-spacing: 0.6em;
      text-transform: uppercase;
      opacity: 0.55;
      border-top: 1px solid rgba(255,255,255,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.3);
      padding: 0.75rem 2rem;
    }
  </style>
</head>
<body>

  <!-- YouTube background video -->
  <!-- Replace YOUR_VIDEO_ID with the actual YouTube video ID -->
  <div id="video-bg">
    <iframe
      src="https://www.youtube.com/embed/YOUR_VIDEO_ID?autoplay=1&mute=1&loop=1&playlist=YOUR_VIDEO_ID&controls=0&showinfo=0&rel=0&disablekb=1&iv_load_policy=3&modestbranding=1"
      allow="autoplay; encrypted-media"
      allowfullscreen
    ></iframe>
  </div>

  <div class="overlay"></div>

  <div class="content">
    <h1 class="logo">Arena Embroidery</h1>
    <p class="tagline">arena-embroidery.com</p>
    <p class="coming-soon">Coming Soon</p>
  </div>

</body>
</html>
