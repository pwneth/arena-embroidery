<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arena Embroidery — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Cinzel:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* Solid black cover that fades out once video is ready */
    #video-cover {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 1.2s ease;
    }
    #video-cover.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Loader */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .loader-ring {
      width: 48px;
      height: 48px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-top-color: rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }

    .loader-text {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* YouTube fullscreen background */
    #video-bg {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 100vw;
      height: 100vh;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    #video-bg iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100vw;
      height: 56.25vw;
      min-height: 100vh;
      min-width: 177.78vh;
      transform: translate(-50%, -50%);
      border: none;
    }

    /* Dark overlay so text is readable */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1;
    }

    /* Layout */
    .content {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      text-align: center;
      color: #fff;
      padding: 4rem 2rem;
    }

    .logo {
      font-family: 'Cinzel', serif;
      font-size: clamp(2rem, 6vw, 5rem);
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .coming-soon {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.4rem, 3.5vw, 2.8rem);
      letter-spacing: 0.12em;
      opacity: 0.85;
    }
  </style>
</head>
<body>

  <div id="video-cover">
    <div class="loader">
      <div class="loader-ring"></div>
      <span class="loader-text">Loading</span>
    </div>
  </div>

  <div id="video-bg">
    <iframe
      id="yt-iframe"
      src="https://www.youtube.com/embed/MXQi-324mHY?autoplay=1&mute=1&loop=1&playlist=MXQi-324mHY&controls=0&showinfo=0&rel=0&disablekb=1&iv_load_policy=3&modestbranding=1&enablejsapi=1"
      allow="autoplay; encrypted-media"
      allowfullscreen
    ></iframe>
  </div>

  <div class="overlay"></div>

  <div class="content">
    <h1 class="logo">Arena Embroidery</h1>
    <p class="coming-soon">Coming Soon</p>
  </div>

  <script>
    const cover = document.getElementById('video-cover');
    let revealed = false;

    function reveal() {
      if (revealed) return;
      revealed = true;
      cover.classList.add('hidden');
    }

    // YouTube iframes send postMessage events when enablejsapi=1
    // Wait an extra 1s after PLAYING so YouTube's own UI overlay finishes fading
    window.addEventListener('message', function (e) {
      if (e.origin !== 'https://www.youtube.com') return;
      try {
        const data = JSON.parse(e.data);
        const state = data.info === 1           // onStateChange format
          || (data.info && data.info.playerState === 1); // infoDelivery format
        if (state) setTimeout(reveal, 1000);
      } catch (_) {}
    });

    // Fallback in case postMessage never fires
    setTimeout(reveal, 6000);

    // When returning to the tab, YouTube re-shows its UI briefly — cover it
    document.addEventListener('visibilitychange', function () {
      if (!document.hidden && revealed) {
        cover.classList.remove('hidden');
        setTimeout(() => cover.classList.add('hidden'), 1500);
      }
    });
  </script>

</body>
</html>
